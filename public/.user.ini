; ── PHP overrides for WAEN Members ──
; These settings apply when PHP runs via CGI/FastCGI (e.g. WAMP mod_fcgid).
; With mod_php, equivalent settings can also go in .htaccess.

upload_max_filesize = 50M
post_max_size       = 60M
max_file_uploads    = 25
memory_limit        = 256M
max_execution_time  = 120
